<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI-SDLC Dashboard</title>
    <style>
        :root {
            --bg: #0d1117; --surface: #161b22; --surface2: #1c2129;
            --border: #30363d; --text: #e6edf3; --text-dim: #8b949e;
            --accent: #58a6ff; --accent2: #3fb950; --accent3: #d2a8ff;
            --accent4: #f0883e;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
            background: var(--bg); color: var(--text); line-height: 1.5;
        }
        .header {
            background: linear-gradient(135deg, #161b22 0%, #1a1f2e 100%);
            border-bottom: 1px solid var(--border); padding: 16px 24px;
            position: sticky; top: 0; z-index: 100;
        }
        .header-inner {
            max-width: 1400px; margin: 0 auto;
            display: flex; align-items: center; justify-content: space-between;
            flex-wrap: wrap; gap: 12px;
        }
        .logo { display: flex; align-items: center; gap: 12px; }
        .logo h1 {
            font-size: 20px; font-weight: 700;
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }
        .logo .badge {
            font-size: 11px; padding: 2px 8px; border-radius: 12px;
            background: rgba(63,185,80,0.15); color: var(--accent2);
            border: 1px solid rgba(63,185,80,0.3);
        }
        .live-dot {
            width: 8px; height: 8px; background: var(--accent2);
            border-radius: 50%; animation: pulse 2s infinite;
        }
        @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
        .stats-bar {
            display: flex; gap: 16px; align-items: center;
            font-size: 13px; color: var(--text-dim);
        }
        .stat { display: flex; align-items: center; gap: 4px; }
        .stat .num { color: var(--accent2); font-weight: 600; }
        .refresh-btn {
            background: rgba(88,166,255,0.1);
            border: 1px solid rgba(88,166,255,0.3);
            color: var(--accent); padding: 6px 14px;
            border-radius: 6px; cursor: pointer; font-size: 13px;
            transition: all 0.2s;
        }
        .refresh-btn:hover { background: rgba(88,166,255,0.2); }
        .refresh-btn.loading { opacity: 0.5; pointer-events: none; }
        .container {
            max-width: 1400px; margin: 0 auto; padding: 16px 24px;
            display: flex; gap: 20px;
        }
        .sidebar {
            width: 260px; flex-shrink: 0; position: sticky; top: 80px;
            height: fit-content; max-height: calc(100vh - 100px); overflow-y: auto;
        }
        .main { flex: 1; min-width: 0; }
        .search-box {
            width: 100%; padding: 8px 12px; background: var(--surface);
            border: 1px solid var(--border); border-radius: 8px;
            color: var(--text); font-size: 13px; margin-bottom: 12px; outline: none;
        }
        .search-box:focus { border-color: var(--accent); }
        .search-box::placeholder { color: var(--text-dim); }
        .sidebar-section {
            font-size: 11px; text-transform: uppercase; letter-spacing: 1px;
            color: var(--text-dim); padding: 16px 14px 6px; font-weight: 600;
        }
        .time-filter { display: flex; gap: 4px; margin-bottom: 12px; }
        .time-btn {
            padding: 4px 10px; border: 1px solid var(--border);
            background: transparent; color: var(--text-dim);
            font-size: 12px; border-radius: 6px; cursor: pointer;
        }
        .time-btn.active {
            background: rgba(63,185,80,0.1);
            border-color: var(--accent2); color: var(--accent2);
        }
        .cat-btn {
            display: flex; align-items: center; gap: 8px; width: 100%;
            padding: 10px 14px; border: none; background: transparent;
            color: var(--text-dim); font-size: 13px; cursor: pointer;
            border-radius: 8px; transition: all 0.15s; text-align: left;
        }
        .cat-btn:hover { background: var(--surface2); color: var(--text); }
        .cat-btn.active {
            background: rgba(88,166,255,0.1); color: var(--accent); font-weight: 600;
        }
        .cat-btn .count {
            margin-left: auto; font-size: 11px;
            background: var(--surface); padding: 1px 6px;
            border-radius: 10px; color: var(--text-dim);
        }
        .cat-btn.active .count {
            background: rgba(88,166,255,0.2); color: var(--accent);
        }
        .card-grid { display: flex; flex-direction: column; gap: 8px; }
        .card {
            background: var(--surface); border: 1px solid var(--border);
            border-radius: 10px; padding: 14px 16px; transition: all 0.15s;
            cursor: pointer; text-decoration: none; color: inherit; display: block;
        }
        .card:hover {
            border-color: var(--accent); background: var(--surface2);
            transform: translateX(2px);
        }
        .card-header {
            display: flex; align-items: flex-start;
            justify-content: space-between; gap: 12px; margin-bottom: 6px;
        }
        .card-title { font-size: 14px; font-weight: 600; color: var(--text); line-height: 1.4; }
        .card-source {
            font-size: 11px; padding: 2px 8px; border-radius: 4px;
            background: var(--surface2); color: var(--text-dim);
            white-space: nowrap; flex-shrink: 0;
        }
        .card-summary {
            font-size: 12px; color: var(--text-dim); line-height: 1.5;
            display: -webkit-box; -webkit-line-clamp: 2;
            -webkit-box-orient: vertical; overflow: hidden;
        }
        .card-meta {
            display: flex; align-items: center; gap: 12px;
            margin-top: 8px; font-size: 11px; color: var(--text-dim);
        }
        .card-cat {
            font-size: 11px; padding: 1px 6px; border-radius: 4px;
            background: rgba(210,168,255,0.1); color: var(--accent3);
        }
        .empty { text-align: center; padding: 60px 20px; color: var(--text-dim); }
        .empty h3 { font-size: 18px; margin-bottom: 8px; color: var(--text); }
        .skeleton {
            background: linear-gradient(90deg, var(--surface) 25%,
                var(--surface2) 50%, var(--surface) 75%);
            background-size: 200% 100%; animation: shimmer 1.5s infinite;
            border-radius: 10px; height: 80px;
        }
        @keyframes shimmer {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }
        @media (max-width: 768px) {
            .container { flex-direction: column; padding: 12px; }
            .sidebar { width: 100%; position: static; max-height: none; }
        }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: var(--bg); }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
    </style>
</head>
<body>
    <div class="header">
        <div class="header-inner">
            <div class="logo">
                <h1>⚡ AI-SDLC Intelligence</h1>
                <span class="badge">LIVE</span>
                <div class="live-dot"></div>
            </div>
            <div class="stats-bar">
                <div class="stat">📊 <span class="num" id="stat-total">-</span> articles</div>
                <div class="stat">🆕 <span class="num" id="stat-recent">-</span> today</div>
                <div class="stat">⏰ <span class="num" id="stat-last">-</span></div>
                <button class="refresh-btn" onclick="refreshNow()">🔄 Refresh</button>
            </div>
        </div>
    </div>

    <div class="container">
        <aside class="sidebar">
            <input type="text" class="search-box" placeholder="🔍 Search..."
                   oninput="filterArticles(this.value)">
            <div class="sidebar-section">Time Range</div>
            <div class="time-filter">
                <button class="time-btn" onclick="setTimeRange(6,this)">6h</button>
                <button class="time-btn active" onclick="setTimeRange(24,this)">24h</button>
                <button class="time-btn" onclick="setTimeRange(72,this)">3d</button>
                <button class="time-btn" onclick="setTimeRange(168,this)">7d</button>
            </div>
            <div class="sidebar-section">Categories</div>
            <div id="cat-list"></div>
        </aside>
        <main class="main">
            <div id="articles" class="card-grid">
                <div class="skeleton"></div><div class="skeleton"></div>
                <div class="skeleton"></div><div class="skeleton"></div>
                <div class="skeleton"></div>
            </div>
        </main>
    </div>

    <script>
        let currentCategory = 'all', currentHours = 24;
        let allArticles = [], searchTerm = '';

        async function loadStats() {
            try {
                const res = await fetch('/api/stats');
                const d = await res.json();
                document.getElementById('stat-total').textContent = d.total_articles;
                document.getElementById('stat-recent').textContent = d.articles_24h;
                document.getElementById('stat-last').textContent =
                    d.last_fetch === 'Never' ? 'Never' : timeAgo(d.last_fetch);
                const cl = document.getElementById('cat-list');
                const all = Object.values(d.categories).reduce((a,b) => a+b, 0);
                let h = `<button class="cat-btn ${currentCategory==='all'?'active':''}"
                    onclick="setCategory('all',this)">📋 All <span class="count">${all}</span></button>`;
                for (const [c, n] of Object.entries(d.categories)) {
                    h += `<button class="cat-btn ${currentCategory===c?'active':''}"
                        onclick="setCategory('${c.replace(/'/g,"\\'")}',this)">
                        ${c} <span class="count">${n}</span></button>`;
                }
                cl.innerHTML = h;
            } catch(e) { console.error('Stats error:', e); }
        }

        async function loadArticles() {
            try {
                const res = await fetch(
                    `/api/articles?category=${encodeURIComponent(currentCategory)}&hours=${currentHours}&limit=300`);
                allArticles = await res.json();
                renderArticles();
            } catch(e) {
                document.getElementById('articles').innerHTML =
                    '<div class="empty"><h3>Loading...</h3><p>Server starting up</p></div>';
            }
        }

        function renderArticles() {
            const c = document.getElementById('articles');
            let f = allArticles;
            if (searchTerm) {
                const t = searchTerm.toLowerCase();
                f = f.filter(a => a.title.toLowerCase().includes(t) ||
                    a.summary.toLowerCase().includes(t) ||
                    a.source.toLowerCase().includes(t));
            }
            if (!f.length) {
                c.innerHTML = `<div class="empty"><h3>No articles</h3>
                    <p>${searchTerm?'Try different terms':'Fetching data...'}</p></div>`;
                return;
            }
            c.innerHTML = f.map(a => {
                const p = a.published ? timeAgo(a.published) : '';
                return `<a class="card" href="${esc(a.url)}" target="_blank" rel="noopener">
                    <div class="card-header">
                        <div class="card-title">${esc(a.title)}</div>
                        <span class="card-source">${esc(a.source)}</span>
                    </div>
                    ${a.summary?`<div class="card-summary">${esc(a.summary)}</div>`:''}
                    <div class="card-meta">
                        <span class="card-cat">${esc(a.category)}</span>
                        ${p?`<span>🕐 ${p}</span>`:''}
                    </div></a>`;
            }).join('');
        }

        function setCategory(cat, el) {
            currentCategory = cat; loadArticles();
            document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
            el.classList.add('active');
        }
        function setTimeRange(h, el) {
            currentHours = h; loadArticles();
            document.querySelectorAll('.time-btn').forEach(b => b.classList.remove('active'));
            el.classList.add('active');
        }
        function filterArticles(t) { searchTerm = t; renderArticles(); }

        async function refreshNow() {
            const b = document.querySelector('.refresh-btn');
            b.classList.add('loading'); b.textContent = '⏳ Fetching...';
            try { await fetch('/api/refresh',{method:'POST'}); }
            catch(e) {}
            await loadStats(); await loadArticles();
            b.classList.remove('loading'); b.textContent = '🔄 Refresh';
        }

        function timeAgo(s) {
            try {
                const d = (Date.now() - new Date(s)) / 1000;
                if (d < 60) return 'now';
                if (d < 3600) return Math.floor(d/60)+'m';
                if (d < 86400) return Math.floor(d/3600)+'h';
                if (d < 604800) return Math.floor(d/86400)+'d';
                return new Date(s).toLocaleDateString();
            } catch { return ''; }
        }
        function esc(t) {
            if (!t) return '';
            const d = document.createElement('div'); d.textContent = t; return d.innerHTML;
        }

        setInterval(() => { loadStats(); loadArticles(); }, 300000);
        loadStats(); loadArticles();
    </script>
</body>
</html>
